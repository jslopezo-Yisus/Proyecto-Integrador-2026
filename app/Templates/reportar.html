<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportar incidencia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="header">
    <div class="container nav">
        <h1 class="logo">🏠 MiHogar</h1>
        <nav>
            <a href="/">Inicio</a>
            <a href="/reportar">Reportar</a>
            <a href="/reportes">Incidencias</a>
        </nav>
    </div>
</header>

<section class="form-section">
    <div class="container form-container">

        <h2>Reportar una incidencia</h2>
        <p>Completa el formulario en pocos pasos</p>

        <form method="POST" enctype="multipart/form-data">

            <label>Título del problema</label>
            <input type="text" name="titulo" placeholder="Ej: Fuga de agua en cocina" required>

            <label>Descripción</label>
            <textarea name="descripcion" placeholder="Describe la incidencia..." required></textarea>

            <label>Dirección</label>
            <input type="text" name="direccion" placeholder="Dirección" required>

            <label>Tipo de daño</label>
            <select name="tipo_dano" required>
                <option value="">Selecciona una opción</option>
                <option value="eléctrico">Eléctrico</option>
                <option value="plomería">Plomería</option>
                <option value="estructura">Estructura</option>
            </select>

            <label>Prioridad</label>
            <select name="prioridad" required>
                <option value="">Selecciona una opción</option>
                <option value="baja">Baja</option>
                <option value="media">Media</option>
                <option value="alta">Alta</option>
            </select>

            <label>Adjuntar imagen (opcional)</label>
            <input type="file" name="imagen" accept="image/*">

            <button type="submit" class="btn primary">Enviar reporte</button>

        </form>

    </div>
</section>

<footer class="footer">
    <p>© 2026 MiHogar</p>
</footer>

</body>
</html>
