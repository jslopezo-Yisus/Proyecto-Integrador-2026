{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg p-4 form-card">

        <h2 class="text-center mb-3">🚨 Reportar Incidencia</h2>
        <p class="text-center text-muted mb-4">
            Completa la información para registrar el problema
        </p>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Título del problema</label>
                <input type="text" name="titulo" class="form-control" placeholder="Ej: Fuga de agua en cocina" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="4" placeholder="Describe la incidencia..." required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Dirección</label>
                <input type="text" name="direccion" class="form-control" placeholder="Dirección completa" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tipo de daño</label>
                    <select name="tipo_dano" class="form-select" required>
                        <option value="">Selecciona</option>
                        <option value="eléctrico">Eléctrico</option>
                        <option value="plomería">Plomería</option>
                        <option value="estructura">Estructura</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Prioridad</label>
                    <select name="prioridad" class="form-select" required>
                        <option value="">Selecciona</option>
                        <option value="baja">Baja</option>
                        <option value="media">Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Adjuntar imagen</label>
                <input type="file" name="imagen" class="form-control" accept="image/*">
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-lg w-100 btn-enviar">
                    🚀 Enviar Reporte
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
