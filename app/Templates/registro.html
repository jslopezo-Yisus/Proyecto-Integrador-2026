{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <h2 class="text-center mb-4">
            Crear Cuenta
        </h2>

        <form method="POST">

            <!-- NOMBRE -->
            <div class="mb-3">
                <label>Nombre</label>
                <input type="text"
                       name="nombre"
                       class="form-control"
                       required>
            </div>

            <!-- CORREO -->
            <div class="mb-3">
                <label>Correo</label>
                <input type="email"
                       name="correo"
                       class="form-control"
                       required>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label>Contraseña</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       required>
            </div>

            <!-- ROL -->
            <div class="mb-3">
                <label>Rol</label>

                <select name="rol"
                        id="rol"
                        class="form-select"
                        onchange="mostrarCampos()"
                        required>

                    <option value="">Seleccione</option>

                    <option value="usuario">
                        Usuario
                    </option>

                    <option value="tecnico">
                        Técnico
                    </option>

                    <option value="entidad">
                        Entidad
                    </option>

                </select>
            </div>

            <!-- TOKEN -->
            <div class="mb-3 d-none" id="tokenDiv">

                <label>Token de acceso</label>

                <input type="text"
                       name="token"
                       class="form-control">

            </div>

            <!-- ENTIDAD -->
            <div class="mb-3 d-none" id="entidadDiv">

                <label>Entidad</label>

                <select name="entidad"
                        class="form-select">

                    <option value="">
                        Seleccione entidad
                    </option>

                    {% for e in entidades %}
                        <option value="{{ e.nombre }}">
                            {{ e.nombre }}
                        </option>
                    {% endfor %}

                </select>

            </div>

            <button class="btn btn-success w-100">
                Registrarse
            </button>

        </form>

    </div>

</div>

<!-- SCRIPT -->
<script>

function mostrarCampos() {

    let rol = document.getElementById("rol").value;

    let tokenDiv = document.getElementById("tokenDiv");
    let entidadDiv = document.getElementById("entidadDiv");

    // ocultar
    tokenDiv.classList.add("d-none");
    entidadDiv.classList.add("d-none");

    // técnico
    if (rol == "tecnico") {

        tokenDiv.classList.remove("d-none");
        entidadDiv.classList.remove("d-none");

    }

    // entidad
    else if (rol == "entidad") {

        tokenDiv.classList.remove("d-none");
        entidadDiv.classList.remove("d-none");

    }

}

</script>

{% endblock %}
