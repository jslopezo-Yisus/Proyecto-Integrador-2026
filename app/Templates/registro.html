{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-lg p-4">
            <h3 class="text-center mb-3">📝 Crear Cuenta</h3>

            <!-- 🔴 MENSAJE DE ERROR -->
            {% if error %}
            <div class="alert alert-danger text-center">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">

                <div class="mb-3">
                    <label>Usuario</label>
                    <input 
                        type="text" 
                        name="nombre" 
                        class="form-control {% if error %}is-invalid{% endif %}" 
                        value="{{ request.form.nombre }}"
                        required>
                </div>

                <div class="mb-3">
                    <label>Correo</label>
                    <input 
                        type="email" 
                        name="correo" 
                        class="form-control {% if error %}is-invalid{% endif %}" 
                        value="{{ request.form.correo }}"
                        required>
                </div>

                <div class="mb-3">
                    <label>Contraseña</label>
                    <input 
                        type="password" 
                        name="password" 
                        class="form-control {% if error %}is-invalid{% endif %}" 
                        required>
                </div>

                <div class="mb-3">
                    <label>Tipo de cuenta</label>
                    <select 
                        name="rol" 
                        id="rol" 
                        class="form-control {% if error %}is-invalid{% endif %}" 
                        onchange="mostrarToken()" 
                        required>

                        <option value="usuario" {% if request.form.rol == 'usuario' %}selected{% endif %}>Usuario</option>
                        <option value="tecnico" {% if request.form.rol == 'tecnico' %}selected{% endif %}>Técnico</option>

                    </select>
                </div>

                <div id="campoToken" style="display:none;">
                    <label>Token de acceso (técnicos)</label>
                    <input 
                        type="text" 
                        name="token" 
                        class="form-control {% if error %}is-invalid{% endif %}" 
                        value="{{ request.form.token }}">
                </div>

                <button class="btn btn-success w-100 mt-3">Registrarse</button>

                <div class="text-center mt-3">
                    <a href="/login">Ya tengo cuenta</a>
                </div>

            </form>
        </div>

    </div>
</div>

<script>
function mostrarToken() {
    let rol = document.getElementById("rol").value;
    let campo = document.getElementById("campoToken");

    campo.style.display = (rol === "tecnico") ? "block" : "none";
}

// 🔥 Mantener estado al recargar (clave UX)
document.addEventListener("DOMContentLoaded", function() {
    mostrarToken();
});
</script>

{% endblock %}
